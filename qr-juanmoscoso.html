<!DOCTYPE html>
<html lang="en" translate="no">
<head>
  <meta charset="UTF-8" />
  <title>Juan Moscoso QR Code</title>
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'none'; script-src-attr 'none'; style-src 'self' 'unsafe-inline'; img-src 'self'; font-src 'self'; connect-src 'none'; object-src 'none'; base-uri 'none'; form-action 'none'; frame-src 'none'; media-src 'none'; worker-src 'none'; manifest-src 'none'; upgrade-insecure-requests; block-all-mixed-content" />
  <meta http-equiv="Permissions-Policy" content="accelerometer=(), camera=(), geolocation=(), gyroscope=(), magnetometer=(), microphone=(), payment=(), usb=(), interest-cohort=()" />
  <meta http-equiv="X-Content-Type-Options" content="nosniff" />
  <meta name="referrer" content="no-referrer" />
  <meta name="robots" content="noindex,nofollow" />
  <meta name="theme-color" content="#050505" />
  <meta name="color-scheme" content="dark" />
  <link rel="icon" type="image/png" sizes="88x88" href="logo-gold-88.png" />
  <link rel="apple-touch-icon" href="logo-gold-88.png" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      margin: 0;
      min-height: 100vh;
      min-height: 100svh;
      display: grid;
      place-items: center;
      padding: 24px;
      background:
        radial-gradient(circle at 50% -10%, rgba(214,180,103,0.18), transparent 38%),
        linear-gradient(180deg, #050505 0%, #080703 48%, #000 100%);
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: #f5f3ea;
    }
    .frame {
      background: #fff;
      padding: 24px;
      border-radius: 24px;
      box-shadow:
        0 24px 60px rgba(0, 0, 0, 0.6),
        inset 0 1px 0 rgba(255,245,205,0.06);
      border: 1px solid rgba(214,180,103,0.42);
      text-align: center;
      max-width: 460px;
      width: 100%;
    }
    img {
      display: block;
      width: min(80vw, 420px);
      height: auto;
      margin: 0 auto;
    }
    p {
      margin: 16px 0 0;
      font-size: 14px;
      color: #444;
      word-break: break-all;
    }
  </style>
</head>
<body>
  <main class="frame">
    <img
      src="qr-juanmoscoso.png"
      alt="QR code for Juan Moscoso business card page"
      width="744"
      height="744"
      decoding="async"
    />
    <p>https://vantacard.github.io/JuanMoscoso/</p>
  </main>
</body>
</html>
